<div class="landing">
  <header class="hero">
    <div class="hero-content">
      <h1 class="game-title">Guards of Atlantis II</h1>
      <p class="subtitle">Turn Initiative Tracker</p>
    </div>
  </header>

  <main class="main-content">
    @if (mode === 'none') {
      <div class="mode-select">
        <button class="primary-btn host-btn" (click)="selectHost()">
          <span class="btn-icon">🛡</span>
          <span>Host Session</span>
        </button>
        <button class="primary-btn join-btn" (click)="selectJoin()">
          <span class="btn-icon">⚓</span>
          <span>Join Session</span>
        </button>
      </div>
    }

    @if (mode === 'host') {
      <div class="form-card">
        <button class="back-btn" (click)="back()">← Back</button>
        <h2>Host a Session</h2>
        <div class="form-group">
          <label for="hostName">Your Name</label>
          <input
            id="hostName"
            type="text"
            [(ngModel)]="playerName"
            placeholder="Enter your name"
            maxlength="20"
            autocomplete="off"
          />
        </div>
        @if (errorMsg) {
          <p class="error-msg">{{ errorMsg }}</p>
        }
        <button class="submit-btn" [disabled]="loading" (click)="hostSession()">
          @if (loading) { Connecting... } @else { Create Session }
        </button>
      </div>
    }

    @if (mode === 'join') {
      <div class="form-card">
        <button class="back-btn" (click)="back()">← Back</button>
        <h2>Join a Session</h2>
        <div class="form-group">
          <label for="joinName">Your Name</label>
          <input
            id="joinName"
            type="text"
            [(ngModel)]="playerName"
            placeholder="Enter your name"
            maxlength="20"
            autocomplete="off"
          />
        </div>
        <div class="form-group">
          <label for="joinCode">Session Code</label>
          <input
            id="joinCode"
            type="text"
            [(ngModel)]="joinCode"
            placeholder="e.g. AB42"
            maxlength="6"
            autocomplete="off"
            class="code-input"
            (input)="joinCode = joinCode.toUpperCase().replace(' ', '')"
          />
        </div>
        @if (errorMsg) {
          <p class="error-msg">{{ errorMsg }}</p>
        }
        <button class="submit-btn" [disabled]="loading" (click)="joinSession()">
          @if (loading) { Connecting... } @else { Join Session }
        </button>
      </div>
    }
  </main>
</div>
